<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astra Sports</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: Arial, sans-serif;
    background:#0a0a0a;
    color:#fff;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:#000;
    position:sticky;
    top:0;
}

.logo{
    font-size:22px;
    font-weight:bold;
}

.logo span{
    color:#00ff88;
}

nav a{
    color:#ccc;
    margin-left:15px;
    text-decoration:none;
    font-size:14px;
}

nav a:hover{
    color:#00ff88;
}

/* BANNER */
.banner{
    padding:60px 20px;
    text-align:center;
    background:#111;
}

.banner h1{
    font-size:26px;
}

.banner p{
    color:#aaa;
    margin-top:10px;
}

/* PRODUTOS */
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:10px;
}

.card{
    background:#111;
    width:160px;
    margin:10px;
    border-radius:10px;
    padding:10px;
    text-align:center;
}

.card img{
    width:100%;
    border-radius:8px;
}

.price{
    color:#00ff88;
    font-weight:bold;
    margin:5px 0;
}

button{
    width:100%;
    padding:8px;
    border:none;
    background:#00ff88;
    font-weight:bold;
    cursor:pointer;
}

/* WHATS */
.whatsapp{
    position:fixed;
    bottom:15px;
    right:15px;
    background:#25D366;
    padding:12px;
    border-radius:50%;
    text-decoration:none;
    color:white;
}

/* FOOTER */
footer{
    text-align:center;
    padding:15px;
    background:#000;
    color:#777;
    margin-top:20px;
}
</style>

</head>

<body>

<header>
    <div class="logo">ASTRA <span>SPORTS</span></div>
    <nav>
        <a href="#">Início</a>
        <a href="#">Produtos</a>
    </nav>
</header>

<div class="banner">
    <h1>Camisas de Futebol</h1>
    <p>Europa e Brasil</p>
</div>

<div class="container">

<div class="card">
    <img src="https://via.placeholder.com/150">
    <p>Real Madrid</p>
    <p class="price">R$149,90</p>
    <button onclick="comprar('Real Madrid')">Comprar</button>
</div>

<div class="card">
    <img src="https://via.placeholder.com/150">
    <p>Flamengo</p>
    <p class="price">R$129,90</p>
    <button onclick="comprar('Flamengo')">Comprar</button>
</div>

<div class="card">
    <img src="https://via.placeholder.com/150">
    <p>Barcelona</p>
    <p class="price">R$149,90</p>
    <button onclick="comprar('Barcelona')">Comprar</button>
</div>

<div class="card">
    <img src="https://via.placeholder.com/150">
    <p>Manchester City</p>
    <p class="price">R$149,90</p>
    <button onclick="comprar('Manchester City')">Comprar</button>
</div>

</div>

<footer>
Astra Sports © 2026
</footer>

<a class="whatsapp" href="https://wa.me/5531996520860">💬</a>

<script>
function comprar(produto){
let msg=`Olá, quero comprar ${produto}`;
window.open(`https://wa.me/5531996520860?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
