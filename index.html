<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astra Sports</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial;
    background:#0a0a0a;
    color:#fff;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background:#000;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.logo span{color:#00ff88;}

nav a{
    color:#ccc;
    margin-left:20px;
    text-decoration:none;
}

nav a:hover{color:#00ff88;}

/* BANNER */
.banner{
    height:300px;
    background:url('https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a') center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
}

.banner h1{
    background:rgba(0,0,0,0.7);
    padding:15px;
}

/* PRODUTOS */
.title{
    text-align:center;
    margin:30px 0;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    width:220px;
    margin:15px;
    background:#111;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{transform:scale(1.05);}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card h3{
    padding:10px;
}

.price{
    color:#00ff88;
    padding-left:10px;
}

button{
    width:90%;
    margin:10px;
    padding:10px;
    border:none;
    background:#00ff88;
    font-weight:bold;
    cursor:pointer;
}

/* WHATS */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
    color:white;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#000;
    margin-top:20px;
}
</style>

</head>

<body>

<header>
    <div class="logo">ASTRA <span>SPORTS</span></div>
    <nav>
        <a href="#">Início</a>
        <a href="#">Produtos</a>
    </nav>
</header>

<div class="banner">
    <h1>🔥 Camisas Originais dos Grandes Clubes</h1>
</div>

<h2 class="title">Mais vendidos</h2>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1600369672013-2d3c7b3a4a5d">
<h3>Real Madrid</h3>
<p class="price">R$149,90</p>
<button onclick="comprar('Real Madrid')">Comprar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1593341646782-e0b495cff86d">
<h3>Flamengo</h3>
<p class="price">R$129,90</p>
<button onclick="comprar('Flamengo')">Comprar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587613754511-3f4b1c6b0f5f">
<h3>Barcelona</h3>
<p class="price">R$149,90</p>
<button onclick="comprar('Barcelona')">Comprar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1612872087720-bb876e2e67d1">
<h3>Manchester City</h3>
<p class="price">R$149,90</p>
<button onclick="comprar('Manchester City')">Comprar</button>
</div>

</div>

<footer>
© Astra Sports 2026
</footer>

<a class="whatsapp" href="https://wa.me/5531996520860">💬</a>

<script>
function comprar(produto){
let msg=`Olá, quero comprar ${produto}`;
window.open(`https://wa.me/5531996520860?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
